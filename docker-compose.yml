services:
  postgres:
    image: postgres:16-alpine
    container_name: inventory_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory-mini-system
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - inventory_network

  backend:
    build: ./backend
    container_name: inventory_backend
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/inventory-mini-system?schema=public"
    depends_on:
      - postgres
    networks:
      - inventory_network

  frontend:
    build: ./frontend
    container_name: inventory_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - inventory_network

volumes:
  pgdata:

networks:
  inventory_network:
    driver: bridge